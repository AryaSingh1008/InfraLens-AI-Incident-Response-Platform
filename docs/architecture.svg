<svg viewBox="0 0 900 980" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>InfraLens System Architecture</title>
  <desc>Full system architecture for InfraLens multi-agent AI incident response platform</desc>
  <style>
    text { font-family: system-ui, -apple-system, sans-serif; }
    .title { font-size: 20px; font-weight: 800; fill: #1a1a1a; }
    .subtitle { font-size: 12px; fill: #777; }
    .layer-label { font-size: 11px; font-weight: 700; fill: #666; letter-spacing: 1.5px; }
    .box-title { font-size: 11px; font-weight: 700; fill: #fff; }
    .box-sub { font-size: 9px; fill: rgba(255,255,255,0.8); }
    .tech-tag { font-size: 8px; font-weight: 600; fill: #FF9D00; }
    .outline-title { font-size: 11px; font-weight: 700; fill: #1a1a1a; }
    .outline-sub { font-size: 9px; fill: #777; }
    .legend-text { font-size: 9px; fill: #666; }
    .arrow-line { stroke: #bbb; stroke-width: 1.5; fill: none; }
    .arrow-bold { stroke: #555; stroke-width: 2; fill: none; }
    .dash { stroke-dasharray: 5,3; }
    .section-line { stroke: #ddd; stroke-width: 1; }
  </style>
  <defs>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#bbb"/></marker>
    <marker id="ahd" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#555"/></marker>
