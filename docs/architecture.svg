  <rect width="900" height="980" fill="#ffffff" rx="0"/>

  <text x="450" y="32" text-anchor="middle" class="title">InfraLens — System Architecture</text>
  <text x="450" y="50" text-anchor="middle" class="subtitle">Multi-Agent AI Incident Response &amp; Infrastructure Intelligence Platform</text>

  <!-- LAYER 1: DATA SOURCES -->
