  <text x="549" y="133" text-anchor="middle" class="box-sub">ELK · Prometheus · Loki</text>
  <text x="549" y="147" text-anchor="middle" class="tech-tag">API Pull on Alert Trigger</text>

  <rect x="664" y="98" width="195" height="56" rx="7" fill="#4A90D9"/>
