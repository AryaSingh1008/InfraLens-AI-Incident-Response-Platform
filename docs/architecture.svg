  <line x1="28" y1="88" x2="872" y2="88" class="section-line"/>

  <rect x="28" y="98" width="195" height="56" rx="7" fill="#4A90D9"/>
  <text x="125" y="119" text-anchor="middle" class="box-title">Alert Streams</text>
  <text x="125" y="133" text-anchor="middle" class="box-sub">PagerDuty · Datadog · OpsGenie</text>
  <text x="125" y="147" text-anchor="middle" class="tech-tag">Webhook Receivers (FastAPI)</text>

  <rect x="240" y="98" width="195" height="56" rx="7" fill="#4A90D9"/>
  <text x="337" y="119" text-anchor="middle" class="box-title">Dashboard Screenshots</text>
  <text x="337" y="133" text-anchor="middle" class="box-sub">Grafana · CloudWatch · K8s UI</text>
