  <text x="549" y="762" text-anchor="middle" class="outline-sub">Retrieval Hit Rate · Drift</text>

  <rect x="664" y="713" width="195" height="58" rx="7" fill="#f5f5f5" stroke="#ccc" stroke-width="1.5"/>
